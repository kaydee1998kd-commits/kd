<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flashlight">
<meta name="theme-color" content="#0a0a0a">
<title>Flashlight</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --off-bg: #0a0a0a;
    --on-bg: #ffffff;
    --btn-off: #1e1e1e;
    --btn-on: #f0f0f0;
    --ring-off: #2a2a2a;
    --ring-on: #cccccc;
    --text-off: #888;
    --text-on: #444;
    --glow-color: rgba(255,255,255,0.15);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--off-bg);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.4s ease;
    overflow: hidden;
    user-select: none;
  }

  body.on {
    background: var(--on-bg);
  }

  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    background: radial-gradient(circle at 50% 40%, rgba(255,255,240,0.6) 0%, transparent 70%);
  }

  body.on .ambient { opacity: 1; }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
    position: relative;
    z-index: 1;
  }

  .label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-off);
    transition: color 0.4s ease;
  }

  body.on .label { color: var(--text-on); }

  .btn-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--ring-off);
    transition: border-color 0.4s ease, transform 0.4s ease, opacity 0.4s ease;
  }

  .ring-1 { width: 200px; height: 200px; opacity: 0.5; }
  .ring-2 { width: 240px; height: 240px; opacity: 0.3; }
  .ring-3 { width: 280px; height: 280px; opacity: 0.15; }

  body.on .ring { border-color: var(--ring-on); }
  body.on .ring-1 { transform: scale(1.05); opacity: 0.6; }
  body.on .ring-2 { transform: scale(1.05); opacity: 0.4; }
  body.on .ring-3 { transform: scale(1.05); opacity: 0.2; }

  .btn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: var(--btn-off);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: background 0.4s ease, transform 0.12s ease, box-shadow 0.4s ease;
    box-shadow: 0 0 0 rgba(255,255,255,0);
    -webkit-appearance: none;
    outline: none;
  }

  body.on .btn {
    background: var(--btn-on);
    box-shadow: 0 0 60px rgba(255,255,200,0.4), 0 0 120px rgba(255,255,200,0.15);
  }

  .btn:active { transform: scale(0.94); }

  .icon {
    width: 52px;
    height: 52px;
    transition: opacity 0.4s ease;
  }

  .icon-off { opacity: 1; }
  .icon-on  { position: absolute; opacity: 0; }

  body.on .icon-off { opacity: 0; }
  body.on .icon-on  { opacity: 1; }

  .status {
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: var(--text-off);
    transition: color 0.4s ease;
    height: 20px;
  }

  body.on .status { color: var(--text-on); }

  .error-msg {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,60,60,0.9);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    max-width: 280px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 10;
    line-height: 1.5;
  }

  .error-msg.show { opacity: 1; }

  .install-hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    text-align: center;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  body.on .install-hint { color: rgba(0,0,0,0.25); }
</style>
</head>
<body>
<div class="ambient"></div>

<div class="container">
  <span class="label">Flashlight</span>

  <div class="btn-wrap">
    <div class="ring ring-3"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-1"></div>
    <button class="btn" id="btn" aria-label="Toggle flashlight">

      <svg class="icon icon-off" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26 8V6M26 46V44M8 26H6M46 26H44M12.7 12.7L11.3 11.3M40.7 40.7L39.3 39.3M39.3 12.7L40.7 11.3M12.7 40.7L11.3 39.3" stroke="#555" stroke-width="2" stroke-linecap="round"/>
        <circle cx="26" cy="26" r="10" stroke="#555" stroke-width="2"/>
        <circle cx="26" cy="26" r="5" fill="#555"/>
      </svg>

      <svg class="icon icon-on" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26 8V6M26 46V44M8 26H6M46 26H44M12.7 12.7L11.3 11.3M40.7 40.7L39.3 39.3M39.3 12.7L40.7 11.3M12.7 40.7L11.3 39.3" stroke="#f5c542" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="26" cy="26" r="10" stroke="#f5c542" stroke-width="2.5"/>
        <circle cx="26" cy="26" r="5" fill="#f5c542"/>
      </svg>

    </button>
  </div>

  <span class="status" id="status">Tap to turn on</span>
</div>

<div class="error-msg" id="err"></div>
<div class="install-hint" id="hint"></div>

<script>
const btn = document.getElementById('btn');
const body = document.body;
const statusEl = document.getElementById('status');
const errEl = document.getElementById('err');
const hintEl = document.getElementById('hint');

let isOn = false;
let track = null;

function showError(msg) {
  errEl.textContent = msg;
  errEl.classList.add('show');
  setTimeout(() => errEl.classList.remove('show'), 4000);
}

async function turnOn() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();
    if (!capabilities.torch) {
      track.stop();
      track = null;
      showError('Torch not supported on this device/browser.');
      return false;
    }
    await track.applyConstraints({ advanced: [{ torch: true }] });
    return true;
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      showError('Camera permission denied. Please allow camera access to use the flashlight.');
    } else {
      showError('Could not access flashlight: ' + e.message);
    }
    return false;
  }
}

function turnOff() {
  if (track) {
    track.applyConstraints({ advanced: [{ torch: false }] }).catch(() => {});
    track.stop();
    track = null;
  }
}

btn.addEventListener('click', async () => {
  if (!isOn) {
    const ok = await turnOn();
    if (!ok) return;
    isOn = true;
    body.classList.add('on');
    statusEl.textContent = 'On';
  } else {
    turnOff();
    isOn = false;
    body.classList.remove('on');
    statusEl.textContent = 'Tap to turn on';
  }
});

window.addEventListener('beforeunload', turnOff);
document.addEventListener('visibilitychange', () => {
  if (document.hidden && isOn) {
    turnOff();
    isOn = false;
    body.classList.remove('on');
    statusEl.textContent = 'Tap to turn on';
  }
});

const isStandalone = window.navigator.standalone;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
if (isIOS && !isStandalone) {
  hintEl.textContent = 'Add to Home Screen for the best experience';
}
</script>
</body>
</html>
