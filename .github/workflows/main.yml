name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Bubble Translate IPA
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd BubbleTranslate-iOS
          xcodegen generate

      - name: Build Archive (No Signing)
        run: |
          cd BubbleTranslate-iOS
          xcodebuild archive \
            -project BubbleTranslate.xcodeproj \
            -scheme BubbleTranslate \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -archivePath build/BubbleTranslate.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=N
