name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Bubble Translate IPA
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove broken LaunchScreen storyboard
        run: rm -f BubbleTranslate-iOS/BubbleTranslate/Resources/LaunchScreen.storyboard

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd BubbleTranslate-iOS
          xcodegen generate

      - name: Build Archive (No Signing)
        run: |
          cd BubbleTranslate-iOS
          xcodebuild archive \
            -project BubbleTranslate.xcodeproj \
            -scheme BubbleTranslate \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -archivePath build/BubbleTranslate.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO

      - name: List app bundle contents
        run: |
          echo "=== App bundle contents ==="
          ls -la BubbleTranslate-iOS/build/BubbleTranslate.xcarchive/Products/Applications/BubbleTranslate.app/
          echo "=== Binary size ==="
          du -sh BubbleTranslate-iOS/build/BubbleTranslate.xcarchive/Products/Applications/BubbleTranslate.app/BubbleTranslate

      - name: Create IPA (Manual)
        run: |
          cd BubbleTranslate-iOS
          mkdir -p build/Payload
          cp -r build/BubbleTranslate.xcarchive/Products/Applications/BubbleTranslate.app build/Payload/
          cd build
          zip -r BubbleTranslate.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTranslate-IPA
          path: BubbleTranslate-iOS/build/BubbleTranslate.ipa
          retention-days: 30
