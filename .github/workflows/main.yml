name: Build Flashlight IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build IPA (unsigned)
        run: |
          mkdir -p build/Payload

          xcodebuild build \
            -project FlashlightApp.xcodeproj \
            -scheme FlashlightApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="com.kaydee1998.FlashlightApp"

          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r FlashlightApp.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FlashlightApp
          path: build/FlashlightApp.ipa
          retention-days: 30
