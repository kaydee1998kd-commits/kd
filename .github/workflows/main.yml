name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          # Only copies index.html; if you have sw.js, add it back to this line
          cp index.html www/ || { echo "Error: index.html not found!"; exit 1; }

      - name: Install Capacitor
        run: |
          npm init -y
          # This line fixes the "Could not find the ios platform" error
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init MicLink com.miclink.app --web-dir=www

      - name: Add iOS Platform
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Update Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Need mic for audio'" ios/App/App/Info.plist

      - name: Build Unsigned IPA
        run: |
          mkdir -p Payload
          
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          cp -r build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r MicLink.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MicLink-Unsigned
          path: MicLink.ipa
