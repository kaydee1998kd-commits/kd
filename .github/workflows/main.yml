name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Bubble Translate IPA
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd BubbleTranslate-iOS
          xcodegen generate

      - name: Remove broken LaunchScreen storyboard
        run: |
          cd BubbleTranslate-iOS
          rm -f BubbleTranslate/Resources/LaunchScreen.storyboard
          /usr/libexec/PlistBuddy -c "Delete :UILaunchStoryboardName" BubbleTranslate/Resources/Info.plist 2>/dev/null || true

      - name: Build Archive (No Signing)
        run: |
          cd BubbleTranslate-iOS
          xcodebuild archive \
            -project BubbleTranslate.xcodeproj \
            -scheme BubbleTranslate \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -archivePath build/BubbleTranslate.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO

      - name: Create IPA (Manual)
        run: |
          cd BubbleTranslate-iOS
          mkdir -p build/Payload
          cp -r build/BubbleTranslate.xcarchive/Products/Applications/BubbleTranslate.app build/Payload/
          brew install ldid
          ldid -S build/Payload/BubbleTranslate.app/BubbleTranslate
          cd build
          zip -r BubbleTranslate.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTranslate-IPA
          path: BubbleTranslate-iOS/build/BubbleTranslate.ipa
          retention-days: 30
