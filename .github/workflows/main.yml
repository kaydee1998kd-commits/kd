name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/ || { echo "Error: index.html not found!"; exit 1; }

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init MicLink com.miclink.app --web-dir=www

      - name: Add iOS Platform
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Update Info.plist
        run: |
          # This ensures the folder exists before trying to edit the file
          if [ -d "ios/App/App" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/App/App/Info.plist || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" ios/App/App/Info.plist || true
            /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Need mic for audio'" ios/App/App/Info.plist || true
          fi

      - name: Build Unsigned IPA
        run: |
          mkdir -p Payload
          
          # This command builds the project. If 'ios/App' isn't the right folder, 
          # it will look for any .xcworkspace file it can find.
          WORKSPACE=$(find . -name "*.xcworkspace" | head -1)
          
          xcodebuild -workspace "$WORKSPACE" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          # Find the .app file and move it to Payload
          APP_FILE=$(find build/App.xcarchive -name "*.app" | head -1)
          cp -r "$APP_FILE" Payload/
          zip -r MicLink.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MicLink-Unsigned
          path: MicLink.ipa
